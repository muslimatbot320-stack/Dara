<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Surprise untuk Teman 🎁</title>

  <!-- Font: Nunito (bulat & hangat) + Pacifico (display playful) -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@300;400;600;700;800&family=Pacifico&display=swap" rel="stylesheet" />

  <style>
    /* ── TOKENS ─────────────────────────────────────────────── */
    :root {
      --p1: #ff6fa8;
      --p2: #ffb3cb;
      --p3: #ffd6e7;
      --v1: #8b3fd1;
      --v2: #b47bea;
      --v3: #d4a5f5;
      --ink:  #3d1d5a;
      --ink2: #6b3fa0;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Nunito', sans-serif;
      min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
      overflow: hidden;
      background: linear-gradient(135deg, #ffe0ef 0%, #f0d4ff 35%, #d4b8ff 65%, #ffb3d9 100%);
      position: relative;
    }

    /* ── FLOATING BG BLOBS ── */
    .blobs { position: fixed; inset: 0; pointer-events: none; z-index: 0; }
    .blob  { position: absolute; border-radius: 50%; opacity: .15; animation: blobFloat linear infinite; }
    .blob:nth-child(1){width:240px;height:240px;background:var(--v3);top:-70px;left:-70px;animation-duration:20s;}
    .blob:nth-child(2){width:150px;height:150px;background:var(--p1);top:8%;right:6%;animation-duration:15s;animation-delay:-5s;}
    .blob:nth-child(3){width:190px;height:190px;background:var(--v2);bottom:4%;left:4%;animation-duration:24s;animation-delay:-9s;}
    .blob:nth-child(4){width:110px;height:110px;background:var(--p2);bottom:18%;right:12%;animation-duration:17s;animation-delay:-3s;}
    .blob:nth-child(5){width:300px;height:300px;background:var(--v1);bottom:-90px;right:-90px;animation-duration:28s;opacity:.08;}
    .blob:nth-child(6){width:95px;height:95px;background:var(--p3);top:42%;left:2%;animation-duration:13s;animation-delay:-11s;}
    @keyframes blobFloat {
      0%,100%{ transform:translateY(0) rotate(0deg) scale(1); }
      33%    { transform:translateY(-28px) rotate(7deg) scale(1.05); }
      66%    { transform:translateY(18px) rotate(-5deg) scale(.96); }
    }

    /* ── STAGE ── */
    .stage {
      position: relative; z-index: 10;
      background: rgba(255,255,255,.52);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1.5px solid rgba(255,255,255,.75);
      border-radius: 36px;
      padding: 52px 44px 44px;
      text-align: center;
      max-width: 440px; width: 92%;
      box-shadow: 0 10px 48px rgba(180,123,234,.2), 0 2px 0 rgba(255,255,255,.8) inset;
      animation: stageIn .9s cubic-bezier(.34,1.56,.64,1) both;
    }
    @keyframes stageIn {
      from{ opacity:0; transform:translateY(50px) scale(.9); }
      to  { opacity:1; transform:translateY(0) scale(1); }
    }

    .hint {
      font-size: .92rem; font-weight: 700; color: var(--ink2);
      letter-spacing: .07em; text-transform: uppercase;
      margin-bottom: 6px; opacity: .7;
    }
    .title-main {
      font-family: 'Pacifico', cursive;
      font-size: 1.9rem; color: var(--ink);
      margin-bottom: 32px;
      text-shadow: 0 3px 14px rgba(180,123,234,.22);
    }

    /* ── GIFT BOX WRAPPER ── */
    .gift-wrap {
      position: relative;
      display: inline-block;
      cursor: pointer;
      margin-bottom: 10px;
      animation: idleSway 3.2s ease-in-out infinite;
      filter: drop-shadow(0 18px 36px rgba(180,80,220,.3));
      transition: filter .2s;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
    }
    .gift-wrap:hover {
      filter: drop-shadow(0 22px 44px rgba(255,80,168,.48));
    }
    @keyframes idleSway {
      0%,100%{ transform: rotate(-3deg) translateY(0); }
      50%    { transform: rotate(3deg)  translateY(-12px); }
    }

    /* -- LID group: normal & animasi buka -- */
    .gift-lid-group {
      transform-origin: 100px 90px; /* pivot di tengah lid */
      transition: none;
    }
    .gift-wrap.opening {
      animation: none; /* hentikan sway */
    }
    .gift-wrap.opening .gift-lid-group {
      animation: lidFly .6s cubic-bezier(.34,1.4,.64,1) forwards;
    }
    @keyframes lidFly {
      0%  { transform: rotate(0deg) translateY(0);        opacity:1; }
      30% { transform: rotate(-15deg) translateY(-50px);  opacity:1; }
      70% { transform: rotate(-30deg) translateY(-130px); opacity:.7; }
      100%{ transform: rotate(-40deg) translateY(-220px); opacity:0; }
    }

    /* Glow burst saat buka */
    .gift-wrap.opening .glow-circle {
      animation: glowBurst .7s ease forwards .1s;
    }
    @keyframes glowBurst {
      0%  { r: 0;   opacity: 0; }
      40% { r: 90;  opacity: .5; }
      100%{ r: 150; opacity: 0; }
    }

    /* Star particles */
    .star-burst { position: absolute; inset: 0; pointer-events: none; }
    .star-burst span {
      position: absolute;
      font-size: 1.5rem;
      left: 50%; top: 40%;
      opacity: 0;
      transform: translate(-50%,-50%);
    }
    .gift-wrap.opening .star-burst span { animation: starFly .75s ease forwards; }
    .gift-wrap.opening .star-burst span:nth-child(1){animation-delay:.05s;--tx:-95px;--ty:-85px;}
    .gift-wrap.opening .star-burst span:nth-child(2){animation-delay:.10s;--tx:95px;--ty:-85px;}
    .gift-wrap.opening .star-burst span:nth-child(3){animation-delay:.07s;--tx:-115px;--ty:5px;}
    .gift-wrap.opening .star-burst span:nth-child(4){animation-delay:.13s;--tx:115px;--ty:5px;}
    .gift-wrap.opening .star-burst span:nth-child(5){animation-delay:.04s;--tx:0px;--ty:-120px;}
    .gift-wrap.opening .star-burst span:nth-child(6){animation-delay:.15s;--tx:-65px;--ty:95px;}
    .gift-wrap.opening .star-burst span:nth-child(7){animation-delay:.09s;--tx:65px;--ty:95px;}
    @keyframes starFly {
      0%  { opacity:1; transform:translate(-50%,-50%) scale(.4); }
      55% { opacity:1; transform:translate(calc(-50% + var(--tx)),calc(-50% + var(--ty))) scale(1.3); }
      100%{ opacity:0; transform:translate(calc(-50% + var(--tx)*1.6),calc(-50% + var(--ty)*1.6)) scale(.7); }
    }

    .click-hint {
      font-size: .88rem; color: var(--ink2);
      font-weight: 700; letter-spacing: .04em; opacity: .68;
      animation: blinkHint 2.2s ease-in-out infinite;
    }
    @keyframes blinkHint {
      0%,100%{ opacity:.68; } 50%{ opacity:.2; }
    }

    /* ── OVERLAY ── */
    .overlay {
      position: fixed; inset: 0;
      background: rgba(40,10,60,.6);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      z-index: 100;
      display: flex; align-items: center; justify-content: center;
      opacity: 0; pointer-events: none;
      transition: opacity .4s ease;
    }
    .overlay.active { opacity:1; pointer-events:all; }

    /* ── MODAL ── */
    .modal {
      background: linear-gradient(155deg,#fff5fb 0%,#f6e8ff 55%,#ffe8f5 100%);
      border: 2px solid rgba(255,255,255,.9);
      border-radius: 30px;
      padding: 50px 38px 42px;
      max-width: 400px; width: 88%;
      text-align: center;
      position: relative; overflow: hidden;
      box-shadow: 0 24px 64px rgba(139,63,209,.38);
      transform: scale(.55) translateY(40px);
      opacity: 0;
      transition: transform .5s cubic-bezier(.34,1.56,.64,1), opacity .38s ease;
    }
    .overlay.active .modal { transform: scale(1) translateY(0); opacity:1; }

    .modal::before,.modal::after{
      content:'✨'; position:absolute; font-size:1.5rem;
      animation:sparkCorn 3s ease-in-out infinite;
    }
    .modal::before{top:16px;left:18px;}
    .modal::after {top:16px;right:18px;animation-delay:.9s;}
    @keyframes sparkCorn{
      0%,100%{transform:translateY(0) rotate(0);opacity:1;}
      50%{transform:translateY(-7px) rotate(14deg);opacity:.45;}
    }

    .modal-emoji {
      font-size: 78px; display:block; margin-bottom: 10px;
      animation: popEmoji .55s cubic-bezier(.34,1.56,.64,1) .3s both;
      filter: drop-shadow(0 8px 18px rgba(255,100,168,.5));
    }
    @keyframes popEmoji{from{transform:scale(0) rotate(-20deg);}to{transform:scale(1) rotate(0);}}

    .modal-headline {
      font-family: 'Pacifico', cursive;
      font-size: 2.5rem; line-height:1.1;
      background: linear-gradient(120deg, var(--p1), var(--v2), var(--v1));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 12px;
      animation: slideUp .5s ease .5s both;
    }
    .modal-bar {
      width:56px; height:3px; border-radius:99px;
      background: linear-gradient(90deg, var(--p1), var(--v2));
      margin: 0 auto 18px;
      animation: growBar .5s ease .65s both;
    }
    @keyframes growBar{from{transform:scaleX(0);opacity:0;}to{transform:scaleX(1);opacity:1;}}
    .modal-msg {
      font-size: 1rem; color: var(--ink2);
      line-height: 1.75; font-weight: 600;
      animation: slideUp .5s ease .75s both;
    }
    .modal-msg strong { color: var(--ink); font-weight: 800; }
    @keyframes slideUp{from{opacity:0;transform:translateY(14px);}to{opacity:1;transform:translateY(0);}}

    .btn-close {
      margin-top: 26px;
      display: inline-flex; align-items: center; gap: 8px;
      padding: 13px 34px;
      background: linear-gradient(120deg, var(--p1), var(--v2));
      color: #fff; border: none; border-radius: 50px;
      font-family: 'Nunito', sans-serif;
      font-size: .95rem; font-weight: 800;
      cursor: pointer;
      box-shadow: 0 5px 18px rgba(180,123,234,.4);
      transition: transform .2s ease, box-shadow .2s ease;
      animation: slideUp .5s ease .9s both;
    }
    .btn-close:hover{ transform:translateY(-3px) scale(1.05); box-shadow:0 9px 26px rgba(180,123,234,.52); }
    .btn-close:active{ transform:scale(.96); }

    /* ── CONFETTI CANVAS ── */
    #confetti-canvas { position:fixed; inset:0; z-index:200; pointer-events:none; }

    /* ── RESPONSIVE ── */
    @media(max-width:480px){
      .stage{ padding:36px 22px 30px; }
      .title-main{ font-size:1.5rem; }
      .modal{ padding:38px 20px 32px; }
      .modal-headline{ font-size:2rem; }
    }
  </style>
</head>
<body>

<!-- Blobs -->
<div class="blobs" aria-hidden="true">
  <div class="blob"></div><div class="blob"></div><div class="blob"></div>
  <div class="blob"></div><div class="blob"></div><div class="blob"></div>
</div>

<!-- Stage utama -->
<div class="stage">
  <p class="hint">✦ Ada sesuatu untukmu ✦</p>
  <h1 class="title-main">Klik kotak kadunya!</h1>

  <!-- GIFT BOX -->
  <div class="gift-wrap" id="giftBox" role="button" tabindex="0" aria-label="Buka kotak kado surprise">

    <!-- Partikel bintang saat dibuka -->
    <div class="star-burst" aria-hidden="true">
      <span>⭐</span><span>🌟</span><span>✨</span>
      <span>💖</span><span>🎀</span><span>🌸</span><span>🎉</span>
    </div>

    <!-- SVG Kotak Kado Besar -->
    <svg width="210" height="220" viewBox="0 0 210 220" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
      <defs>
        <!-- Glow radial saat buka -->
        <radialGradient id="gGrad" cx="50%" cy="50%" r="50%">
          <stop offset="0%" stop-color="#ffb3e8" stop-opacity="1"/>
          <stop offset="100%" stop-color="#d480ff" stop-opacity="0"/>
        </radialGradient>
        <!-- Kotak bawah -->
        <linearGradient id="boxG" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="#ff85bb"/>
          <stop offset="100%" stop-color="#c83880"/>
        </linearGradient>
        <!-- Pita emas -->
        <linearGradient id="ribG" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="#fff0aa"/>
          <stop offset="100%" stop-color="#ffc840"/>
        </linearGradient>
        <!-- Tutup -->
        <linearGradient id="lidG" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="#ff9fd4"/>
          <stop offset="100%" stop-color="#d83c96"/>
        </linearGradient>
        <filter id="sh" x="-25%" y="-25%" width="150%" height="170%">
          <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#b040e8" flood-opacity=".28"/>
        </filter>
      </defs>

      <!-- Glow circle (hidden, animates on open) -->
      <circle class="glow-circle" cx="105" cy="140" r="0" fill="url(#gGrad)" opacity="0"/>

      <!-- ═══ BADAN KOTAK ═══ -->
      <g filter="url(#sh)">
        <!-- Kotak utama -->
        <rect x="18" y="118" width="174" height="92" rx="14" fill="url(#boxG)"/>
        <!-- Highlight kiri -->
        <rect x="18" y="118" width="28" height="92" rx="0" fill="rgba(255,255,255,.13)"/>
        <!-- Sisi kanan (shadow) -->
        <rect x="164" y="118" width="28" height="92" rx="0" fill="rgba(0,0,0,.08)"/>
        <!-- Pita vertikal -->
        <rect x="92" y="118" width="26" height="92" fill="url(#ribG)"/>
        <!-- Pita horizontal -->
        <rect x="18" y="147" width="174" height="24" fill="url(#ribG)"/>
        <!-- Highlight atas kotak -->
        <rect x="18" y="118" width="174" height="16" rx="14" fill="rgba(255,255,255,.2)"/>
        <!-- Kilap pita vertikal -->
        <rect x="97" y="118" width="8" height="92" fill="rgba(255,255,255,.22)"/>
        <!-- Kilap pita horizontal -->
        <rect x="18" y="149" width="174" height="7" fill="rgba(255,255,255,.2)"/>
        <!-- Lubang kecil dekoratif -->
        <circle cx="52"  cy="164" r="5" fill="rgba(255,255,255,.25)"/>
        <circle cx="158" cy="172" r="4" fill="rgba(255,255,255,.2)"/>
        <circle cx="38"  cy="182" r="3" fill="rgba(255,255,255,.18)"/>
        <circle cx="168" cy="152" r="2.5" fill="rgba(255,255,255,.2)"/>
      </g>

      <!-- ═══ TUTUP / LID ═══ -->
      <g class="gift-lid-group">
        <!-- Lid body -->
        <rect x="10" y="94" width="190" height="38" rx="13" fill="url(#lidG)" filter="url(#sh)"/>
        <!-- Highlight lid atas -->
        <rect x="10" y="94" width="190" height="14" rx="13" fill="rgba(255,255,255,.24)"/>
        <!-- Sisi kanan lid -->
        <rect x="172" y="94" width="28" height="38" rx="0" fill="rgba(0,0,0,.07)"/>
        <!-- Pita di lid -->
        <rect x="92" y="94" width="26" height="38" fill="url(#ribG)"/>
        <rect x="97" y="94" width="8"  height="38" fill="rgba(255,255,255,.25)"/>

        <!-- ═══ PITA / BOW ═══ -->
        <!-- Ribbon kiri atas -->
        <ellipse cx="80"  cy="87" rx="32" ry="17" fill="#ffc840" transform="rotate(-28 80 87)"/>
        <ellipse cx="80"  cy="87" rx="20" ry="10" fill="#ffe898" transform="rotate(-28 80 87)"/>
        <!-- Ribbon kanan atas -->
        <ellipse cx="130" cy="87" rx="32" ry="17" fill="#ffc840" transform="rotate(28 130 87)"/>
        <ellipse cx="130" cy="87" rx="20" ry="10" fill="#ffe898" transform="rotate(28 130 87)"/>
        <!-- Simpul tengah -->
        <circle cx="105" cy="88" r="16" fill="#ffc840"/>
        <circle cx="105" cy="88" r="10" fill="#fff0aa"/>
        <circle cx="105" cy="88" r="5.5" fill="#ffc840"/>
        <!-- Kilap simpul -->
        <circle cx="101" cy="84" r="3" fill="rgba(255,255,255,.55)"/>
        <!-- Ekor pita turun -->
        <rect x="100" y="96" width="10" height="36" fill="#ffc840"/>
        <rect x="103" y="96" width="4"  height="36" fill="rgba(255,255,255,.3)"/>
      </g>
    </svg>
  </div><!-- /gift-wrap -->

  <p class="click-hint">👆 Tap untuk membuka!</p>
</div><!-- /stage -->

<!-- Overlay + Modal -->
<div class="overlay" id="overlay" role="dialog" aria-modal="true" aria-labelledby="mHeadline">
  <div class="modal" id="modal">
    <span class="modal-emoji" aria-hidden="true">🎉</span>
    <h2 class="modal-headline" id="mHeadline">SURPRISE!!!</h2>
    <div class="modal-bar"></div>
    <p class="modal-msg">
      Hai teman! 👋<br/>
      Ini website spesial dari <strong>Dara</strong> 💖<br/><br/>
      Kamu sangat berarti dan selalu membuat<br/>hari-hariku lebih berwarna.<br/>
      Semoga harimu seindah senyumanmu! 🌸
    </p>
    <button class="btn-close" id="btnClose" aria-label="Tutup modal">
      💌 Makasih, Dara!
    </button>
  </div>
</div>

<!-- Confetti -->
<canvas id="confetti-canvas" aria-hidden="true"></canvas>

<script>
  /* ─── Refs ─── */
  const giftBox  = document.getElementById('giftBox');
  const overlay  = document.getElementById('overlay');
  const btnClose = document.getElementById('btnClose');
  const canvas   = document.getElementById('confetti-canvas');
  const ctx      = canvas.getContext('2d');

  /* ─── Canvas resize ─── */
  function resizeCanvas(){ canvas.width=innerWidth; canvas.height=innerHeight; }
  resizeCanvas();
  window.addEventListener('resize', resizeCanvas);

  /* ─── Confetti system ─── */
  let particles=[], raf=null;
  const COLS=['#ff6fa8','#ffb3cb','#d4a5f5','#b47bea','#ff9de2',
              '#ffd6e7','#c9a7ff','#ff79c6','#fff0aa','#ffcf77','#a0f0c8'];

  function mkParticle(){
    return {
      x:Math.random()*canvas.width, y:-20,
      r:Math.random()*9+4,
      c:COLS[Math.random()*COLS.length|0],
      vy:Math.random()*3.5+1.8,
      vx:(Math.random()-.5)*3,
      rot:Math.random()*Math.PI*2,
      rs:(Math.random()-.5)*.16,
      shape:Math.random()<.5?'rect':'circle'
    };
  }
  function drawP(p){
    ctx.save(); ctx.translate(p.x,p.y); ctx.rotate(p.rot);
    ctx.fillStyle=p.c; ctx.globalAlpha=.88;
    if(p.shape==='rect') ctx.fillRect(-p.r/2,-p.r/2,p.r,p.r*1.6);
    else{ ctx.beginPath(); ctx.arc(0,0,p.r/2,0,Math.PI*2); ctx.fill(); }
    ctx.restore();
  }
  function loopConfetti(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    /* Tambah partikel baru sampai 220 butir */
    if(particles.length<220) for(let i=0;i<7;i++) particles.push(mkParticle());
    particles=particles.filter(p=>{
      p.y+=p.vy; p.x+=p.vx; p.rot+=p.rs; drawP(p);
      return p.y<canvas.height+30;
    });
    if(particles.length) raf=requestAnimationFrame(loopConfetti);
    else ctx.clearRect(0,0,canvas.width,canvas.height);
  }
  function startConfetti(){ particles=[]; if(raf)cancelAnimationFrame(raf); loopConfetti(); }
  function stopConfetti(){
    if(raf)cancelAnimationFrame(raf); raf=null; particles=[];
    ctx.clearRect(0,0,canvas.width,canvas.height);
  }

  /* ─── Sound effect (Web Audio API, tanpa file luar) ─── */
  function playPop(){
    try{
      const ac=new(window.AudioContext||window.webkitAudioContext)();
      // Nada 1: pop pendek
      const o1=ac.createOscillator(), g1=ac.createGain();
      o1.type='sawtooth'; o1.connect(g1); g1.connect(ac.destination);
      o1.frequency.setValueAtTime(550,ac.currentTime);
      o1.frequency.exponentialRampToValueAtTime(950,ac.currentTime+.1);
      g1.gain.setValueAtTime(.2,ac.currentTime);
      g1.gain.exponentialRampToValueAtTime(.001,ac.currentTime+.2);
      o1.start(ac.currentTime); o1.stop(ac.currentTime+.2);
      // Nada 2: sparkle tinggi
      const o2=ac.createOscillator(), g2=ac.createGain();
      o2.type='sine'; o2.connect(g2); g2.connect(ac.destination);
      o2.frequency.setValueAtTime(1300,ac.currentTime+.1);
      o2.frequency.exponentialRampToValueAtTime(750,ac.currentTime+.4);
      g2.gain.setValueAtTime(.1,ac.currentTime+.1);
      g2.gain.exponentialRampToValueAtTime(.001,ac.currentTime+.45);
      o2.start(ac.currentTime+.1); o2.stop(ac.currentTime+.45);
    }catch(e){}
  }

  /* ─── Buka kotak kado ─── */
  let opened = false;

  function openGift(){
    if(opened) return;
    opened = true;

    /* Tambah class .opening → lid terbang + stars burst */
    giftBox.classList.add('opening');
    playPop();

    /* Setelah animasi lid selesai (~600ms), tampilkan modal + confetti */
    setTimeout(()=>{
      overlay.classList.add('active');
      startConfetti();
    }, 560);
  }

  /* ─── Tutup modal ─── */
  function closeModal(){
    overlay.classList.remove('active');
    stopConfetti();
    /* Reset setelah fade out overlay */
    setTimeout(()=>{
      giftBox.classList.remove('opening');
      opened = false;
    }, 420);
  }

  /* ─── Event listeners ─── */
  giftBox.addEventListener('click', openGift);
  giftBox.addEventListener('keydown', e=>{ if(e.key==='Enter'||e.key===' ') openGift(); });
  btnClose.addEventListener('click', closeModal);
  overlay.addEventListener('click', e=>{ if(e.target===overlay) closeModal(); });
  document.addEventListener('keydown', e=>{ if(e.key==='Escape'&&overlay.classList.contains('active')) closeModal(); });
</script>
</body>
</html>
